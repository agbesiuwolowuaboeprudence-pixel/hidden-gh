# Application
spring.application.name=hidden-ghana-backend
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hiddenghana}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT - Base64 encoded secret
jwt.secret=${JWT_SECRET:aGlkZGVuZ2hhbmFfc2VjcmV0X2tleV8yMDI2X3ZlcnlfbG9uZ19zZWNyZXRfa2V5X2Zvcl9qd3RfdG9rZW4=}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.hiddenghana=DEBUG