server:
  port: ${PORT:4000}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hidden_gh}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      # 'update' is convenient in dev; switch to 'validate' once schema is stable
      # and manage schema changes via migrations instead.
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  jwt:
    secret: ${JWT_SECRET:dev_only_change_this_to_a_long_random_string_in_production}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000} # 7 days

logging:
  level:
    org.hibernate.SQL: WARN
